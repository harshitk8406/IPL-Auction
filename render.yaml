services:
  - type: web
    name: ipl-auction-app
    env: node
    # Build: install all deps and compile React frontend
    buildCommand: npm install --prefix backend && npm install --prefix frontend && npm run build --prefix frontend
    # Start: Node.js serves both the API and the compiled React app
    startCommand: node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
